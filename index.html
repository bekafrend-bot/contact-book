<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои Контакты</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo.png">
</head>
<body>

<div class="main-box">
    <h1>Книга контактов</h1>
    
    <div class="search-section">
        <input type="text" id="findInput" placeholder="Найти кого-то...">
    </div>

    <div class="add-section">
        <h3>Новый контакт</h3>
        <form id="myBtnForm">
            <input type="hidden" id="editId">
            <input type="text" id="userName" placeholder="Имя" required>
            <input type="text" id="userPhone" placeholder="Номер телефона" required>
            <input type="text" id="userEmail" placeholder="Почта (необязательно)">
            <select id="userGroup">
                <option value="Без группы">Без группы</option>
                <option value="Семья">Семья</option>
                <option value="Друзья">Друзья</option>
                <option value="Работа">Работа</option>
            </select>
            <button type="submit" id="saveBtn">Сохранить</button>
            <button type="button" id="stopEdit" style="display:none">Отмена</button>
        </form>
    </div>

    <div class="list-section">
        <div class="tabs">
            <button class="tab-btn active" onclick="setFilter('all')">Все</button>
            <button class="tab-btn" onclick="setFilter('Семья')">Семья</button>
            <button class="tab-btn" onclick="setFilter('Друзья')">Друзья</button>
            <button class="tab-btn" onclick="setFilter('Работа')">Работа</button>
        </div>
        <div id="list"></div>
    </div>
</div>

<script src="script.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>

</body>
</html>
